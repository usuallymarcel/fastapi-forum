services:
  forum:
    build: .
    container_name: forum-page
    restart: unless-stopped
    labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`forum.marcel.co.nz`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls=true"
        - "traefik.http.routers.api.tls.certresolver=myresolver"
        - "traefik.http.services.api.loadbalancer.server.port=8000"

        - "traefik.http.middlewares.forum-ratelimit.ratelimit.average=100"
        - "traefik.http.middlewares.forum-ratelimit.ratelimit.burst=50"

        - "traefik.http.middlewares.forum-buffer.buffering.maxRequestBodyBytes=5242880"

        - "traefik.http.routers.api.middlewares=forum-ratelimit,forum-buffer"
    networks:
      - proxy

networks:
  proxy:
    external: true